syntax = "proto3";
package chat.pb;

// ======================================
// Message 微服务 gRPC 接口
// ======================================
service MessageService {
    // 逻辑服务请求存储服务进行双写/持久化
    rpc SaveMsg (SaveMsgReq) returns (SaveMsgResp) {}
}

message SaveMsgReq {
    string msg_id = 1;
    uint64 sender_id = 2;
    uint64 receiver_id = 3;
    int32 session_type = 4;
    int32 msg_type = 5;
    string content = 6;
}

message SaveMsgResp {
    int32 code = 1;
    string msg = 2;
    string seq_id = 3; // 存储服务分配的自增ID
}
