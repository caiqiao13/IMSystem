syntax = "proto3";
package chat.pb;

// ======================================
// Logic 微服务 gRPC 接口
// ======================================
service LogicService {
    // 网关服务发往逻辑服务的发消息请求
    rpc SendMessage (SendMsgReq) returns (SendMsgResp) {}
}

message SendMsgReq {
    string msg_id = 1;        // 全局唯一的消息 UUID
    uint64 sender_id = 2;     // 发送者 UserID
    uint64 receiver_id = 3;   // 接收者 UserID 或 群 GroupID
    int32 session_type = 4;   // 1:单聊 2:群聊
    int32 msg_type = 5;       // 1:文本 2:图片 3:语音等
    string content = 6;       // 消息内容 (明文或 JSON Payload)
}

message SendMsgResp {
    int32 code = 1;           // 0 成功, 其他失败
    string msg = 2;           // 错误描述 (如 "包含敏感词", "不是好友")
    string seq_id = 3;        // 如果成功，返回分配的严格递增序号
}
